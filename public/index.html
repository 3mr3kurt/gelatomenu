<!doctype html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Gelato Store Menu</title>
  <link rel="stylesheet" href="https://use.typekit.net/iey0snc.css">
  <link rel="stylesheet" type="text/css" href="styles.css">
</head>
<body>
  <h1>Current Flavors</h1>
  <div id="tab-bar">
    <button class="tab active" data-target="gelato-section">Gelato</button>
    <button class="tab" data-target="sorbet-section">Sorbet</button>
  </div>
  <div id="menu-container">
    <div class="flavor-section active" id="gelato-section">
      <h2 class="section-header">Gelato</h2>
      <div class="flavor-grid" id="gelato-menu"></div>
    </div>
    <div class="flavor-section" id="sorbet-section">
      <h2 class="section-header">Sorbet</h2>
      <div class="flavor-grid" id="sorbet-menu"></div>
    </div>
  </div>
  <script src="menu.js"></script>
</body>
</html>
